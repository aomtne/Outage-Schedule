        }

        function filter() {
            return data.filter(d => {
                if (!state.years.has(String(d.year))) return false;
                if (!state.regions.has(d.region)) return false;
                if (state.plants.size > 0 && !state.plants.has(d.plant)) return false;
                return true;
            });
        }

        // Group filtered records by plant+unit into rows
        function groupByPlantUnit(filtered) {
            const map = new Map();
            filtered.forEach(r => {
                const key = r.plant + ' ' + (r.unit || '');
                if (!map.has(key)) map.set(key, { label: key, plant: r.plant, type: r.type, region: r.region, records: [] });
                map.get(key).records.push(r);
            });
            const groups = [...map.values()];
            // Sort records within each group by start date first
            groups.forEach(g => g.records.sort((a,b) => new Date(a.start) - new Date(b.start)));
            // Sort groups by earliest start date (ascending)
            groups.sort((a, b) => new Date(a.records[0].start) - new Date(b.records[0].start));
            return groups;
        }

        function render() {
            const filtered = filter();
            const labelsEl = document.getElementById('ganttLabels');
            const barsEl = document.getElementById('ganttBars');
            const innerEl = document.getElementById('ganttInner');
            const timeCells = document.getElementById('timeCells');

            if (filtered.length === 0) {
                labelsEl.innerHTML = '<div class="empty-msg">無資料</div>';
                innerEl.innerHTML = '';
                timeCells.innerHTML = '';
                return;
            }

            let groups = groupByPlantUnit(filtered);

            // Calculate date range: use custom dates if set, otherwise auto from data
            let minD, maxD;
            if (state.dateFrom && state.dateTo) {
                minD = new Date(state.dateFrom);
                maxD = new Date(state.dateTo);
            } else {
                let minT = Infinity, maxT = -Infinity;
                filtered.forEach(d => {
                    const s = new Date(d.start).getTime(), e = new Date(d.end).getTime();
                    if (s < minT) minT = s;
                    if (e > maxT) maxT = e;
                });
                minD = new Date(minT); maxD = new Date(maxT);
                // Snap to granularity boundaries with padding
                if (state.gran === 'day') {
                    minD.setDate(minD.getDate() - 3);
                    maxD.setDate(maxD.getDate() + 3);
                } else if (state.gran === 'week') {
                    minD.setDate(minD.getDate() - 7);
                    maxD.setDate(maxD.getDate() + 7);
                } else {
                    minD = new Date(minD.getFullYear(), minD.getMonth(), 1);
                    maxD = new Date(maxD.getFullYear(), maxD.getMonth() + 2, 1);
                }
            }

            // 強制執行各粒度最大日期範圍限制
            const maxDays = MAX_RANGE_DAYS[state.gran] || 365;
            const rangeDays = Math.ceil((maxD - minD) / 864e5);
            const rangeWarningEl = document.getElementById('rangeWarning');
            if (rangeDays > maxDays) {
                maxD = new Date(minD.getTime() + maxDays * 864e5);
                if (rangeWarningEl) {
                    const granLabel = {day:'日', week:'週', month:'月'}[state.gran];
                    rangeWarningEl.textContent = `⚠ 時間粒度「${granLabel}」最大顯示範圍為 ${maxDays} 天，已自動截斷`;
                    rangeWarningEl.style.display = '';
                }
            } else {
                if (rangeWarningEl) rangeWarningEl.style.display = 'none';
            }

            // When custom date range + any inspection toggle is on,
            // hide units that have NO inspection bars in the visible range
            if (state.dateFrom && state.dateTo && (state.showNDT || state.showET)) {
                const rangeS = minD.getTime(), rangeE = maxD.getTime();
                groups = groups.filter(g => {
                    return g.records.some(r => {
                        const rS = new Date(r.start), rE = new Date(r.end);
                        const dur = (rE - rS) / 864e5;
                        if (dur <= 0) return false;
                        const recKey = `${r.plant}|${r.unit||''}|${r.year}`;
                        // Check NDT
                        if (state.showNDT) {
                            let ns, ne;
                            const ndtOv = state.ndtOverrides[recKey];
                            if (ndtOv) {
                                ns = new Date(ndtOv.start); ne = new Date(ndtOv.end);
                            } else {
                                ns = new Date(rS); ns.setDate(ns.getDate() + state.ndtOffStart);
                                ne = new Date(rE); ne.setDate(ne.getDate() - state.ndtOffEnd);
                            }
                            if (ne > ns && ne.getTime() > rangeS && ns.getTime() < rangeE) return true;
                        }
                        // Check ET
                        if (state.showET) {
                            const uN = (r.unit||'').toUpperCase();
                            const isGT = /GT\d/.test(uN);
                            const isST = /ST\d/.test(uN) && !isGT;
                            const isETPlant = (r.plant === '林口' || r.plant === '協和');
                            if (isST || (isETPlant && !isGT)) {
                                let es, ee;
                                const etOv = state.etOverrides[recKey];
                                if (etOv) {
                                    es = new Date(etOv.start); ee = new Date(etOv.end);
                                } else {
                                    es = new Date(rS); es.setDate(es.getDate() + state.etOffStart);
                                    ee = new Date(rE); ee.setDate(ee.getDate() - state.etOffEnd);
                                }
                                if (ee > es && ee.getTime() > rangeS && es.getTime() < rangeE) return true;
                            }
                        }
                        return false;
                    });
                });
            }

            const totalDays = Math.ceil((maxD - minD) / 864e5);
            const barsWidth = barsEl.clientWidth - 8;
            const pxPerDay = Math.max(barsWidth / totalDays, 0.2);
            const fullW = totalDays * pxPerDay;

            // === Time header based on granularity ===
            let thHtml = '';
            const timeSubRow = document.getElementById('timeSubRow');
            const timeSubCells = document.getElementById('timeSubCells');
            if (state.gran === 'day') {
                // Top level: year/month
                let cur = new Date(minD.getFullYear(), minD.getMonth(), 1);
                while (cur <= maxD) {
                    const next = new Date(cur.getFullYear(), cur.getMonth()+1, 1);
                    const s = Math.max(0, (cur - minD) / 864e5);
                    const e = Math.min(totalDays, (next - minD) / 864e5);
                    const w = (e - s) * pxPerDay;
                    const label = w > 35 ? cur.getFullYear()+'/'+(cur.getMonth()+1) : '';
                    thHtml += `<div class="tcell" style="width:${w}px;font-weight:600">${label}</div>`;
                    cur = next;
                }
                // Sub level: individual day numbers
                let subHtml = '';
                let d = new Date(minD);
                for (let i = 0; i < totalDays; i++) {
                    const dayNum = d.getDate();
                    const isWeekend = (d.getDay() === 0 || d.getDay() === 6);
                    const isMon1 = dayNum === 1;
                    const bg = isMon1 ? '#e3f2fd' : (isWeekend ? '#fff8e1' : '');
                    const fw = isMon1 ? 'font-weight:700;color:#1565c0;' : '';
                    const label = pxPerDay >= 14 ? String(dayNum) : (dayNum % 5 === 1 || dayNum === 1 ? String(dayNum) : '');
                    subHtml += `<div class="tcell" style="width:${pxPerDay}px;${fw}${bg ? 'background:'+bg+';' : ''}border-right:1px solid ${isMon1 ? '#90caf9' : '#f0f0f0'};">${label}</div>`;
                    d.setDate(d.getDate() + 1);
                }
                timeSubRow.style.display = '';
                timeSubCells.innerHTML = subHtml;
            } else if (state.gran === 'week') {
                // Top level: year/month
                let cur = new Date(minD.getFullYear(), minD.getMonth(), 1);
                while (cur <= maxD) {
                    const next = new Date(cur.getFullYear(), cur.getMonth()+1, 1);
                    const s = Math.max(0, (cur - minD) / 864e5);
                    const e = Math.min(totalDays, (next - minD) / 864e5);
                    const w = (e - s) * pxPerDay;
                    const label = w > 35 ? cur.getFullYear()+'/'+(cur.getMonth()+1) : '';
                    thHtml += `<div class="tcell" style="width:${w}px;font-weight:600">${label}</div>`;
                    cur = next;
                }
                // Sub level: individual weeks (W1, W2...)
                let subHtml = '';
                // Find the first Monday on or after minD
                let wk = new Date(minD);
                const dayOfWeek = wk.getDay();
                const daysToMon = dayOfWeek === 0 ? 1 : (dayOfWeek === 1 ? 0 : 8 - dayOfWeek);
                if (daysToMon > 0) {
                    // Partial first week before the first Monday
                    const partialW = daysToMon * pxPerDay;
                    if (partialW > 2) {
                        subHtml += `<div class="tcell" style="width:${partialW}px;border-right:1px solid #e0e0e0;"></div>`;
                    }
                    wk.setDate(wk.getDate() + daysToMon);
                }
                while (wk < maxD) {
                    const nextWk = new Date(wk); nextWk.setDate(nextWk.getDate() + 7);
                    const wkEnd = nextWk > maxD ? maxD : nextWk;
                    const wkDays = (wkEnd - wk) / 864e5;
                    const w = wkDays * pxPerDay;
                    // Label: M/D of Monday
                    const label = w > 28 ? (wk.getMonth()+1)+'/'+wk.getDate() : '';
                    const isMon1 = wk.getDate() <= 7 && wk.getDate() >= 1;
                    subHtml += `<div class="tcell" style="width:${w}px;border-right:1px solid ${isMon1 ? '#90caf9' : '#e0e0e0'};">${label}</div>`;
                    wk = nextWk;
                }
                timeSubRow.style.display = '';
                timeSubCells.innerHTML = subHtml;
            } else {
                // Top level: year
                let cur = new Date(minD.getFullYear(), 0, 1);
                while (cur <= maxD) {
                    const next = new Date(cur.getFullYear()+1, 0, 1);
                    const s = Math.max(0, (cur - minD) / 864e5);
                    const e = Math.min(totalDays, (next - minD) / 864e5);
                    const w = (e - s) * pxPerDay;
                    const label = w > 20 ? String(cur.getFullYear()) : '';
                    thHtml += `<div class="tcell" style="width:${w}px;font-weight:600">${label}</div>`;
                    cur = next;
                }
                // Sub level: individual months
                let subHtml = '';
                let mo = new Date(minD.getFullYear(), minD.getMonth(), 1);
                // Partial first month if minD is not the 1st
                if (minD.getDate() > 1) {
                    const nextMo = new Date(mo.getFullYear(), mo.getMonth()+1, 1);
                    const partialDays = (nextMo - minD) / 864e5;
                    const w = partialDays * pxPerDay;
                    const label = w > 20 ? (mo.getMonth()+1)+'月' : (w > 12 ? String(mo.getMonth()+1) : '');
                    subHtml += `<div class="tcell" style="width:${w}px;border-right:1px solid #ccc;">${label}</div>`;
                    mo = nextMo;
                }
                while (mo < maxD) {
                    const nextMo = new Date(mo.getFullYear(), mo.getMonth()+1, 1);
                    const moEnd = nextMo > maxD ? maxD : nextMo;
                    const moDays = (moEnd - mo) / 864e5;
                    const w = moDays * pxPerDay;
                    const label = w > 20 ? (mo.getMonth()+1)+'月' : (w > 12 ? String(mo.getMonth()+1) : '');
                    const isQ1 = mo.getMonth() % 3 === 0;
                    subHtml += `<div class="tcell" style="width:${w}px;border-right:1px solid ${isQ1 ? '#90caf9' : '#ccc'};${isQ1 ? 'font-weight:600;' : ''}">${label}</div>`;
                    mo = nextMo;
                }
                timeSubRow.style.display = '';
                timeSubCells.innerHTML = subHtml;
            }
            timeCells.innerHTML = thHtml;

            // === Grid lines based on granularity ===
            const rowH = 22;
            const totalH = groups.length * rowH;
            let gridHtml = '';

            if (state.gran === 'day') {
                // Daily grid lines + monthly solid lines
                let cur = new Date(minD);
                cur.setDate(cur.getDate() + 1);
                while (cur <= maxD) {
                    const x = ((cur - minD) / 864e5) * pxPerDay;
                    const isMon1 = cur.getDate() === 1;
                    const isSun = cur.getDay() === 0;
                    if (isMon1) {
                        gridHtml += `<div class="grid-line" style="left:${x}px;height:${totalH}px;background:#90caf9;width:1.5px"></div>`;
                    } else if (pxPerDay >= 8) {
                        gridHtml += `<div class="grid-line" style="left:${x}px;height:${totalH}px;background:${isSun ? '#e0e0e0' : '#f0f0f0'}"></div>`;
                    }
                    cur.setDate(cur.getDate() + 1);
                }
            } else if (state.gran === 'week') {
                // Weekly grid lines + monthly solid lines
                let cur = new Date(minD);
                const dow = cur.getDay();
                const toMon = dow === 0 ? 1 : (dow === 1 ? 0 : 8 - dow);
                cur.setDate(cur.getDate() + toMon);
                while (cur <= maxD) {
                    const x = ((cur - minD) / 864e5) * pxPerDay;
                    const isMon1 = cur.getDate() <= 7;
                    gridHtml += `<div class="grid-line" style="left:${x}px;height:${totalH}px;background:${isMon1 ? '#90caf9' : '#e8e8e8'}"></div>`;
                    cur.setDate(cur.getDate() + 7);
                }
                // Monthly solid lines on top
                let mCur = new Date(minD.getFullYear(), minD.getMonth()+1, 1);
                while (mCur <= maxD) {
                    const x = ((mCur - minD) / 864e5) * pxPerDay;
                    gridHtml += `<div class="grid-line" style="left:${x}px;height:${totalH}px;background:#90caf9;width:1.5px"></div>`;
                    mCur.setMonth(mCur.getMonth()+1);
                }
            } else {
                // Monthly grid lines + yearly solid lines
                let cur = new Date(minD.getFullYear(), minD.getMonth()+1, 1);
                while (cur <= maxD) {
                    const x = ((cur - minD) / 864e5) * pxPerDay;
                    const isYear = cur.getMonth() === 0;
                    const isQ = cur.getMonth() % 3 === 0;
                    gridHtml += `<div class="grid-line" style="left:${x}px;height:${totalH}px;background:${isYear ? '#90caf9' : (isQ ? '#ccc' : '#e8e8e8')};${isYear ? 'width:1.5px' : ''}"></div>`;
                    cur.setMonth(cur.getMonth()+1);
                }
            }

            // === Labels and bars ===
            let labHtml = '';
            let barHtml = '';

            groups.forEach((g, rowIdx) => {
                labHtml += `<div class="glabel" title="${g.label}">${g.label}</div>`;

                g.records.forEach(r => {
                    const rStart = new Date(r.start), rEnd = new Date(r.end);
                    const startOff = (rStart - minD) / 864e5;
                    const dur = (rEnd - rStart) / 864e5;
                    const left = startOff * pxPerDay;
                    const w = Math.max(dur * pxPerDay, 2);
                    const top = rowIdx * rowH + (rowH - 14) / 2;

                    // NDT personnel count for this bar
                    const cat = unitCategory(r.unit);
                    const ndtPC = cat === 'GT' ? state.pGT : cat === 'ST' ? state.pST : state.pOther;
                    // ET personnel for applicable units
                    const uCheck = (r.unit||'').toUpperCase();
                    const isGTu = /GT\d/.test(uCheck);
                    const isSTu = /ST\d/.test(uCheck) && !isGTu;
                    const isETp = (r.plant === '林口' || r.plant === '協和');
                    const etPC = (isSTu || (isETp && !isGTu)) ? state.pET : 0;

                    barHtml += `<div class="gbar ${typeClass(r.type)}"
                        style="left:${left}px;width:${w}px;top:${top}px"
                        data-p="${r.plant}" data-u="${r.unit||''}"
                        data-s="${r.start}" data-e="${r.end}"
                        data-d="${r.days}" data-t="${r.type}" data-y="${r.year}"
                        data-cat="${cat}" data-ndt="${ndtPC}" data-et="${etPC}"></div>`;

                    // NDT overlay bar
                    if (state.showNDT && dur > 0) {
                        const ndtKey = `${r.plant}|${r.unit||''}|${r.year}`;
                        const ndtSplitsExist = ndtKey in state.ndtSplits;

                        if (ndtSplitsExist) {
                            // Render split segments
                            const segments = state.ndtSplits[ndtKey];
                            segments.forEach((seg, segIdx) => {
                                const segStart = new Date(seg.start);
                                const segEnd = new Date(seg.end);
                                if (segEnd > segStart) {
                                    const nL = ((segStart - minD) / 864e5) * pxPerDay;
                                    const nW = Math.max(((segEnd - segStart) / 864e5) * pxPerDay, 2);
                                    const nTop = rowIdx * rowH + 1;
                                    const ndtDays = Math.round((segEnd - segStart) / 864e5);
                                    const ns = segStart.toISOString().slice(0,10);
                                    const ne = segEnd.toISOString().slice(0,10);
                                    const segPC = seg.pc !== null ? seg.pc : ndtPC;
                                    const pcOvCls = seg.pc !== null ? ' override' : '';
                                    const pcBadge = segPC > 0 ? `<span class="bar-pc ndt${pcOvCls}">${segPC}</span>` : '';
                                    barHtml += `<div class="gbar-ndt has-override" data-key="${ndtKey}" data-type="ndt" data-seg="${segIdx}"
                                        style="left:${nL}px;width:${nW}px;top:${nTop}px"
                                        data-p="${r.plant}" data-u="${r.unit||''}"
                                        data-s="${ns}" data-e="${ne}" data-os="${r.start}" data-oe="${r.end}"
                                        data-d="${ndtDays}" data-label="NDT" data-y="${r.year}"
                                        data-pc="${segPC}" data-defpc="${ndtPC}">
                                        ${pcBadge}
                                        <div class="drag-handle left"></div>
                                        <div class="drag-handle right"></div>
                                    </div>`;
                                }
                            });
                        } else {
                            // Render single bar (original logic)
                            let ndtStart, ndtEnd;
                            const ndtOv = state.ndtOverrides[ndtKey];
                            if (ndtOv) {
                                ndtStart = new Date(ndtOv.start);
                                ndtEnd = new Date(ndtOv.end);
                            } else {
                                ndtStart = new Date(rStart); ndtStart.setDate(ndtStart.getDate() + state.ndtOffStart);
                                ndtEnd = new Date(rEnd); ndtEnd.setDate(ndtEnd.getDate() - state.ndtOffEnd);
                            }
                            if (ndtEnd > ndtStart) {
                                const nL = ((ndtStart - minD) / 864e5) * pxPerDay;
                                const nW = Math.max(((ndtEnd - ndtStart) / 864e5) * pxPerDay, 2);
                                const nTop = rowIdx * rowH + 1;
                                const ndtDays = Math.round((ndtEnd - ndtStart) / 864e5);
                                const ns = ndtStart.toISOString().slice(0,10);
                                const ne = ndtEnd.toISOString().slice(0,10);
                                const hasOv = ndtOv ? ' has-override' : '';
                                const ndtBarPC = (ndtKey in state.ndtPCOverrides) ? state.ndtPCOverrides[ndtKey] : ndtPC;
                                const pcOvCls = (ndtKey in state.ndtPCOverrides) ? ' override' : '';
                                const pcBadge = ndtBarPC > 0 ? `<span class="bar-pc ndt${pcOvCls}">${ndtBarPC}</span>` : '';
                                barHtml += `<div class="gbar-ndt${hasOv}" data-key="${ndtKey}" data-type="ndt"
                                    style="left:${nL}px;width:${nW}px;top:${nTop}px"
                                    data-p="${r.plant}" data-u="${r.unit||''}"
                                    data-s="${ns}" data-e="${ne}" data-os="${r.start}" data-oe="${r.end}"
                                    data-d="${ndtDays}" data-label="NDT" data-y="${r.year}"
                                    data-pc="${ndtBarPC}" data-defpc="${ndtPC}">
                                    ${pcBadge}
                                    <div class="drag-handle left"></div>
                                    <div class="drag-handle right"></div>
                                </div>`;
                            }
                        }
                    }

                    // ET overlay bar: ST units + 林口 + 協和 (GT excluded)
                    if (state.showET && dur > 0) {
                        const uNorm = (r.unit||'').toUpperCase();
                        const isGT = /GT\d/.test(uNorm);
                        const isST = /ST\d/.test(uNorm) && !isGT;
                        const isETPlant = (r.plant === '林口' || r.plant === '協和');
                        const needET = isST || (isETPlant && !isGT);
                        if (needET) {
                            const etKey = `${r.plant}|${r.unit||''}|${r.year}`;
                            const etSplitsExist = etKey in state.etSplits;

                            if (etSplitsExist) {
                                // Render split segments
                                const segments = state.etSplits[etKey];
                                segments.forEach((seg, segIdx) => {
                                    const segStart = new Date(seg.start);
                                    const segEnd = new Date(seg.end);
                                    if (segEnd > segStart) {
                                        const eL = ((segStart - minD) / 864e5) * pxPerDay;
                                        const eW = Math.max(((segEnd - segStart) / 864e5) * pxPerDay, 2);
                                        const eTop = rowIdx * rowH + rowH - 9;
                                        const etDays = Math.round((segEnd - segStart) / 864e5);
                                        const es = segStart.toISOString().slice(0,10);
                                        const ee = segEnd.toISOString().slice(0,10);
                                        const defETPC = state.pET;
                                        const segPC = seg.pc !== null ? seg.pc : defETPC;
                                        const etPcOvCls = seg.pc !== null ? ' override' : '';
                                        const etPcBadge = segPC > 0 ? `<span class="bar-pc et${etPcOvCls}">${segPC}</span>` : '';
                                        barHtml += `<div class="gbar-et has-override" data-key="${etKey}" data-type="et" data-seg="${segIdx}"
                                            style="left:${eL}px;width:${eW}px;top:${eTop}px"
                                            data-p="${r.plant}" data-u="${r.unit||''}"
                                            data-s="${es}" data-e="${ee}" data-os="${r.start}" data-oe="${r.end}"
                                            data-d="${etDays}" data-label="ET" data-y="${r.year}"
                                            data-pc="${segPC}" data-defpc="${defETPC}">
                                            ${etPcBadge}
                                            <div class="drag-handle left"></div>
                                            <div class="drag-handle right"></div>
                                        </div>`;
                                    }
                                });
                            } else {
                                // Render single bar (original logic)
                                let etStart, etEnd;
                                const etOv = state.etOverrides[etKey];
                                if (etOv) {
                                    etStart = new Date(etOv.start);
                                    etEnd = new Date(etOv.end);
                                } else {
                                    etStart = new Date(rStart); etStart.setDate(etStart.getDate() + state.etOffStart);
                                    etEnd = new Date(rEnd); etEnd.setDate(etEnd.getDate() - state.etOffEnd);
                                }
                                if (etEnd > etStart) {
                                    const eL = ((etStart - minD) / 864e5) * pxPerDay;
                                    const eW = Math.max(((etEnd - etStart) / 864e5) * pxPerDay, 2);
                                    const eTop = rowIdx * rowH + rowH - 9;
                                    const etDays = Math.round((etEnd - etStart) / 864e5);
                                    const es = etStart.toISOString().slice(0,10);
                                    const ee = etEnd.toISOString().slice(0,10);
                                    const hasOv = etOv ? ' has-override' : '';
                                    const defETPC = state.pET;
                                    const etBarPC = (etKey in state.etPCOverrides) ? state.etPCOverrides[etKey] : defETPC;
                                    const etPcOvCls = (etKey in state.etPCOverrides) ? ' override' : '';
                                    const etPcBadge = etBarPC > 0 ? `<span class="bar-pc et${etPcOvCls}">${etBarPC}</span>` : '';
                                    barHtml += `<div class="gbar-et${hasOv}" data-key="${etKey}" data-type="et"
                                        style="left:${eL}px;width:${eW}px;top:${eTop}px"
                                        data-p="${r.plant}" data-u="${r.unit||''}"
                                        data-s="${es}" data-e="${ee}" data-os="${r.start}" data-oe="${r.end}"
                                        data-d="${etDays}" data-label="ET" data-y="${r.year}"
                                        data-pc="${etBarPC}" data-defpc="${defETPC}">
                                        ${etPcBadge}
                                        <div class="drag-handle left"></div>
                                        <div class="drag-handle right"></div>
                                    </div>`;
                                }
                            }
                        }
                    }
                });
            });

            // === Personnel summary: 3 rows (NDT / ET / Total) ===
            const hasNDTPersonnel = state.pGT > 0 || state.pST > 0 || state.pOther > 0 || Object.keys(state.ndtPCOverrides).length > 0;
            const hasETPersonnel = state.pET > 0 || Object.keys(state.etPCOverrides).length > 0;
            const hasPersonnel = hasNDTPersonnel || hasETPersonnel;
            const singleRowH = 56;
            const summaryRows = [];
            if (hasNDTPersonnel) summaryRows.push('NDT');
            if (hasETPersonnel) summaryRows.push('ET');
            if (hasPersonnel) summaryRows.push('Total');
            const summaryRowH = summaryRows.length * singleRowH;

            if (hasPersonnel) {
                // Accumulate daily NDT and ET person counts
                const ndtDay = new Int32Array(totalDays + 1);
                const etDay  = new Int32Array(totalDays + 1);

                groups.forEach(g => {
                    g.records.forEach(r => {
                        const rS = new Date(r.start), rE = new Date(r.end);
                        const dur = (rE - rS) / 864e5;
                        if (dur <= 0) return;
                        const recKey = `${r.plant}|${r.unit||''}|${r.year}`;

                        if (hasNDTPersonnel) {
                            const cat = unitCategory(r.unit);
                            const defPC = cat === 'GT' ? state.pGT : cat === 'ST' ? state.pST : state.pOther;

                            const ndtSplitsExist = recKey in state.ndtSplits;
                            if (ndtSplitsExist) {
                                // Accumulate from segments
                                const segments = state.ndtSplits[recKey];
                                segments.forEach(seg => {
                                    const segPC = seg.pc !== null ? seg.pc : defPC;
                                    if (segPC > 0) {
                                        const segStart = new Date(seg.start);
                                        const segEnd = new Date(seg.end);
                                        if (segEnd > segStart) {
                                            const d0 = Math.max(0, Math.floor((segStart - minD) / 864e5));
                                            const d1 = Math.min(totalDays, Math.ceil((segEnd - minD) / 864e5));
                                            for (let d = d0; d < d1; d++) ndtDay[d] += segPC;
                                        }
                                    }
                                });
                            } else {
                                // Accumulate single bar
                                const pc = (recKey in state.ndtPCOverrides) ? state.ndtPCOverrides[recKey] : defPC;
                                if (pc > 0) {
                                    let ns, ne;
                                    const ndtOv = state.ndtOverrides[recKey];
                                    if (ndtOv) {
                                        ns = new Date(ndtOv.start);
                                        ne = new Date(ndtOv.end);
                                    } else {
                                        ns = new Date(rS); ns.setDate(ns.getDate() + state.ndtOffStart);
                                        ne = new Date(rE); ne.setDate(ne.getDate() - state.ndtOffEnd);
                                    }
                                    if (ne > ns) {
                                        const d0 = Math.max(0, Math.floor((ns - minD) / 864e5));
                                        const d1 = Math.min(totalDays, Math.ceil((ne - minD) / 864e5));
                                        for (let d = d0; d < d1; d++) ndtDay[d] += pc;
                                    }
                                }
                            }
                        }

                        if (hasETPersonnel) {
                            const uN = (r.unit||'').toUpperCase();
                            const isGT = /GT\d/.test(uN);
                            const isST = /ST\d/.test(uN) && !isGT;
                            const isETPlant = (r.plant === '林口' || r.plant === '協和');
                            if (isST || (isETPlant && !isGT)) {
                                const defETPC = state.pET;
                                const etSplitsExist = recKey in state.etSplits;

                                if (etSplitsExist) {
                                    // Accumulate from segments
                                    const segments = state.etSplits[recKey];
                                    segments.forEach(seg => {
                                        const segPC = seg.pc !== null ? seg.pc : defETPC;
                                        if (segPC > 0) {
                                            const segStart = new Date(seg.start);
                                            const segEnd = new Date(seg.end);
                                            if (segEnd > segStart) {
                                                const d0 = Math.max(0, Math.floor((segStart - minD) / 864e5));
                                                const d1 = Math.min(totalDays, Math.ceil((segEnd - minD) / 864e5));
                                                for (let d = d0; d < d1; d++) etDay[d] += segPC;
                                            }
                                        }
                                    });
                                } else {
                                    // Accumulate single bar
                                    let es, ee;
                                    const etOv = state.etOverrides[recKey];
                                    if (etOv) {
                                        es = new Date(etOv.start);
                                        ee = new Date(etOv.end);
                                    } else {
                                        es = new Date(rS); es.setDate(es.getDate() + state.etOffStart);
                                        ee = new Date(rE); ee.setDate(ee.getDate() - state.etOffEnd);
                                    }
                                    const etPC = (recKey in state.etPCOverrides) ? state.etPCOverrides[recKey] : defETPC;
                                    if (ee > es && etPC > 0) {
                                        const d0 = Math.max(0, Math.floor((es - minD) / 864e5));
                                        const d1 = Math.min(totalDays, Math.ceil((ee - minD) / 864e5));
                                        for (let d = d0; d < d1; d++) etDay[d] += etPC;
                                    }
                                }
                            }
                        }
                    });
                });

                const totalDay = new Int32Array(totalDays + 1);
                for (let d = 0; d < totalDays; d++) totalDay[d] = ndtDay[d] + etDay[d];

                // Helper: draw one summary bar-chart row
                function drawSummaryRow(dayArr, rowOffset, color, label, maxVal, baseline) {
                    const chartH = singleRowH - 14;
                    // Ensure maxVal covers baseline for proper scaling
                    const effMax = (baseline > 0 && baseline > maxVal) ? baseline : maxVal;

                    labHtml += `<div class="glabel" style="height:${singleRowH}px;font-weight:700;color:${color};border-top:2px solid ${color};flex-direction:column;justify-content:center;line-height:1.3">
                        <span style="font-size:11px">${label}</span>
                        ${baseline > 0 ? `<span style="font-size:9px;color:#d32f2f">基線:${baseline}</span>` : ''}</div>`;

                    barHtml += `<div style="position:absolute;left:0;top:${rowOffset}px;width:${fullW}px;height:${singleRowH}px;border-top:2px solid ${color};background:${color}08;overflow:visible">`;

                    // Y-axis max label
                    barHtml += `<span style="position:absolute;right:3px;top:1px;font-size:8px;color:#999;z-index:5">${effMax}</span>`;

                    // Baseline horizontal dashed line
                    if (baseline > 0) {
                        const blH = (baseline / effMax) * chartH;
                        const blTop = singleRowH - blH;
                        barHtml += `<div style="position:absolute;left:0;width:100%;top:${blTop}px;height:0;border-top:2px dashed #d32f2f;z-index:6;pointer-events:none"></div>`;
                        barHtml += `<span style="position:absolute;left:4px;top:${blTop - 12}px;font-size:9px;font-weight:700;color:#d32f2f;z-index:7;pointer-events:none">${baseline}</span>`;
                    }

                    // Draw bar segments with numbers — color red if exceeding baseline
                    let segS = 0, segV = dayArr[0];
                    for (let d = 1; d <= totalDays; d++) {
                        const v = d < totalDays ? dayArr[d] : -1;
                        if (v !== segV) {
                            if (segV > 0) {
                                const x = segS * pxPerDay;
                                const w = (d - segS) * pxPerDay;
                                const h = Math.max((segV / effMax) * chartH, 2);
                                const overBaseline = baseline > 0 && segV > baseline;
                                const barColor = overBaseline ? '#d32f2f' : color;
                                const barOpacity = overBaseline ? 0.75 : 0.6;
                                barHtml += `<div style="position:absolute;left:${x}px;bottom:0;width:${Math.max(w,1)}px;height:${h}px;background:${barColor};opacity:${barOpacity};border-radius:1px 1px 0 0" title="${segV}人${overBaseline ? ' ⚠超過基線' : ''}"></div>`;
                                if (w > 16) {
                                    const lTop = singleRowH - h - 13;
                                    const numColor = overBaseline ? '#d32f2f' : '#333';
                                    barHtml += `<span style="position:absolute;left:${x}px;top:${Math.max(lTop,0)}px;width:${w}px;text-align:center;font-size:9px;font-weight:700;color:${numColor};pointer-events:none;z-index:5">${segV}</span>`;
                                }
                            }
                            segS = d;
                            segV = v;
                        }
                    }
                    barHtml += `</div>`;
                }

                // Compute maxes for consistent scale per row
                const maxNdt = hasNDTPersonnel ? (Math.max(...ndtDay) || 1) : 1;
                const maxEt  = hasETPersonnel ? (Math.max(...etDay) || 1) : 1;
                const maxTot = Math.max(...totalDay) || 1;

                let curOffset = groups.length * rowH;

                if (hasNDTPersonnel) {
                    drawSummaryRow(ndtDay, curOffset, '#e65100', '檢測人力(NDT)', maxNdt, state.baseNDT);
                    curOffset += singleRowH;
                }
                if (hasETPersonnel) {
                    drawSummaryRow(etDay, curOffset, '#880e4f', '檢測人力(ET)', maxEt, state.baseET);
                    curOffset += singleRowH;
                }
                if (hasPersonnel) {
                    drawSummaryRow(totalDay, curOffset, '#1565c0', '檢測人力(Total)', maxTot, state.baseTotal);
                }
            }

            labelsEl.innerHTML = labHtml;
            innerEl.style.width = fullW + 'px';
            innerEl.style.height = (totalH + summaryRowH) + 'px';
            innerEl.innerHTML = gridHtml + barHtml;

            // Show/hide reset button based on overrides
            const hasOverrides = Object.keys(state.ndtOverrides).length > 0 || Object.keys(state.etOverrides).length > 0 || Object.keys(state.ndtPCOverrides).length > 0 || Object.keys(state.etPCOverrides).length > 0 || Object.keys(state.ndtSplits).length > 0 || Object.keys(state.etSplits).length > 0;
            const rb = document.getElementById('resetOverrides');
            if (rb) rb.style.display = hasOverrides ? '' : 'none';

            // Tooltip — covers .gbar, .gbar-ndt, .gbar-et
            const tip = document.getElementById('tip');
            innerEl.querySelectorAll('.gbar').forEach(bar => {
                bar.addEventListener('mouseenter', e => {
                    const b = e.target.dataset;
                    let pcParts = [];
                    if (parseInt(b.ndt) > 0) pcParts.push(`NDT ${b.ndt}人`);
                    if (parseInt(b.et) > 0) pcParts.push(`ET ${b.et}人`);
                    const pcText = pcParts.length ? ' | ' + pcParts.join(', ') : '';
                    tip.textContent = `${b.p} ${b.u} | ${b.s} ~ ${b.e} | ${b.d}天 | ${b.t} | ${b.y}年度${pcText}`;
                    tip.classList.add('vis');
                });
                bar.addEventListener('mousemove', e => {
                    tip.style.left = (e.clientX+12)+'px';
                    tip.style.top = (e.clientY+12)+'px';
                });
                bar.addEventListener('mouseleave', () => tip.classList.remove('vis'));
            });
            innerEl.querySelectorAll('.gbar-ndt, .gbar-et').forEach(bar => {
                bar.addEventListener('mouseenter', e => {
                    const b = e.target.dataset;
                    const pcInfo = parseInt(b.pc) > 0 ? ` | ${b.pc}人` : '';
                    tip.textContent = `[${b.label}] ${b.p} ${b.u} | ${b.s} ~ ${b.e} | ${b.d}天 | ${b.y}年度${pcInfo} (右鍵修改人數, 中鍵分割)`;
                    tip.classList.add('vis');
                });
                bar.addEventListener('mousemove', e => {
                    tip.style.left = (e.clientX+12)+'px';
                    tip.style.top = (e.clientY+12)+'px';
                });
                bar.addEventListener('mouseleave', () => tip.classList.remove('vis'));
            });

            // === Drag interaction for NDT/ET bars ===
            const dragTip = document.getElementById('dragTip');
            let dragState = null;

            function pxToDate(px) {
                const days = px / pxPerDay;
                return new Date(minD.getTime() + days * 864e5);
            }
            function dateToPx(d) {
                return ((d - minD) / 864e5) * pxPerDay;
            }
            function fmtD(d) { return d.toISOString().slice(0,10); }

            innerEl.querySelectorAll('.gbar-ndt, .gbar-et').forEach(bar => {
                // Left handle: resize start
                const leftH = bar.querySelector('.drag-handle.left');
                const rightH = bar.querySelector('.drag-handle.right');

                function startDrag(e, mode) {
                    e.preventDefault();
                    e.stopPropagation();
                    const rect = barsEl.getBoundingClientRect();
                    const barRect = bar.getBoundingClientRect();
                    const origLeft = parseFloat(bar.style.left);
                    const origWidth = parseFloat(bar.style.width);
                    const startX = e.clientX;
                    bar.classList.add('dragging');
                    tip.classList.remove('vis');

                    dragState = { bar, mode, rect, origLeft, origWidth, startX,
                        key: bar.dataset.key, type: bar.dataset.type,
                        ovhaulStart: bar.dataset.os, ovhaulEnd: bar.dataset.oe };

                    document.addEventListener('mousemove', onDragMove);
                    document.addEventListener('mouseup', onDragEnd);
                }

                leftH.addEventListener('mousedown', e => startDrag(e, 'left'));
                rightH.addEventListener('mousedown', e => startDrag(e, 'right'));
                bar.addEventListener('mousedown', e => {
                    if (e.target.classList.contains('drag-handle')) return;
                    startDrag(e, 'move');
                });
            });

            function onDragMove(e) {
                if (!dragState) return;
                const { bar, mode, origLeft, origWidth, startX } = dragState;
                const dx = e.clientX - startX;
                let newLeft = origLeft, newWidth = origWidth;

                if (mode === 'left') {
                    newLeft = origLeft + dx;
                    newWidth = origWidth - dx;
                    if (newWidth < 4) { newWidth = 4; newLeft = origLeft + origWidth - 4; }
                } else if (mode === 'right') {
                    newWidth = origWidth + dx;
                    if (newWidth < 4) newWidth = 4;
                } else { // move
                    newLeft = origLeft + dx;
                }

                bar.style.left = newLeft + 'px';
                bar.style.width = newWidth + 'px';

                // Show date tip
                const newStart = pxToDate(newLeft);
                const newEnd = pxToDate(newLeft + newWidth);
                const days = Math.round((newEnd - newStart) / 864e5);
                dragTip.textContent = `${fmtD(newStart)} ~ ${fmtD(newEnd)} (${days}天)`;
                dragTip.style.left = (e.clientX + 14) + 'px';
                dragTip.style.top = (e.clientY - 28) + 'px';
                dragTip.classList.add('vis');
            }

            function onDragEnd(e) {
                if (!dragState) return;
                const { bar, key, type } = dragState;
                bar.classList.remove('dragging');
                dragTip.classList.remove('vis');
                document.removeEventListener('mousemove', onDragMove);
                document.removeEventListener('mouseup', onDragEnd);

                // Calculate final dates
                const finalLeft = parseFloat(bar.style.left);
                const finalWidth = parseFloat(bar.style.width);
                const newStart = pxToDate(finalLeft);
                const newEnd = pxToDate(finalLeft + finalWidth);

                if (newEnd > newStart) {
                    // Snap to whole days
                    newStart.setHours(0,0,0,0);
                    newEnd.setHours(0,0,0,0);

                    const segIdx = bar.dataset.seg !== undefined ? parseInt(bar.dataset.seg) : null;
                    if (segIdx !== null) {
                        // Save to segment
                        const splits = type === 'ndt' ? state.ndtSplits : state.etSplits;
                        if (key in splits && splits[key][segIdx]) {
                            splits[key][segIdx].start = newStart.toISOString().slice(0,10);
                            splits[key][segIdx].end = newEnd.toISOString().slice(0,10);
                        }
                    } else {
                        // Save to override
                        const overrides = type === 'ndt' ? state.ndtOverrides : state.etOverrides;
                        overrides[key] = { start: newStart.toISOString().slice(0,10), end: newEnd.toISOString().slice(0,10) };
                    }
                }

                dragState = null;
                render(); // Re-render to update personnel summary
            }

            // === Right-click to edit personnel count ===
            const pcEditor = document.getElementById('pcEditor');
            const pcInput = document.getElementById('pcEditorInput');
            const pcLabel = document.getElementById('pcEditorLabel');
            let pcEditTarget = null;

            function closePCEditor() {
                pcEditor.classList.remove('vis');
                pcEditTarget = null;
            }

            innerEl.querySelectorAll('.gbar-ndt, .gbar-et').forEach(bar => {
                bar.addEventListener('contextmenu', e => {
                    e.preventDefault();
                    e.stopPropagation();
                    const key = bar.dataset.key;
                    const bType = bar.dataset.type;
                    const curPC = parseInt(bar.dataset.pc) || 0;
                    const defPC = parseInt(bar.dataset.defpc) || 0;
                    const parts = key.split('|');
                    const plantName = parts[0], unitName = parts[1], yr = bar.dataset.y;
                    const segIdx = bar.dataset.seg !== undefined ? parseInt(bar.dataset.seg) : null;

                    pcLabel.textContent = `[${bType.toUpperCase()}] ${plantName} ${unitName} (${yr}年) — 派工人數`;
                    pcInput.value = curPC;
                    pcEditTarget = { key, bType, defPC, segIdx };

                    // Position near click
                    pcEditor.style.left = (e.clientX + 10) + 'px';
                    pcEditor.style.top = (e.clientY - 40) + 'px';
                    pcEditor.classList.add('vis');
                    pcInput.focus();
                    pcInput.select();
                });
            });

            document.getElementById('pcEditorOk').addEventListener('click', () => {
                if (!pcEditTarget) return;
                const val = parseInt(pcInput.value) || 0;
                const { key, bType, segIdx } = pcEditTarget;

                if (segIdx !== null) {
                    // Save to segment
                    const splits = bType === 'ndt' ? state.ndtSplits : state.etSplits;
                    if (key in splits && splits[key][segIdx]) {
                        splits[key][segIdx].pc = val;
                    }
                } else {
                    // Save to override
                    const overrides = bType === 'ndt' ? state.ndtPCOverrides : state.etPCOverrides;
                    overrides[key] = val;
                }
                closePCEditor();
                render();
            });

            document.getElementById('pcEditorReset').addEventListener('click', () => {
                if (!pcEditTarget) return;
                const { key, bType, segIdx } = pcEditTarget;

                if (segIdx !== null) {
                    // Reset segment pc to null (use default)
                    const splits = bType === 'ndt' ? state.ndtSplits : state.etSplits;
                    if (key in splits && splits[key][segIdx]) {
                        splits[key][segIdx].pc = null;
                    }
                } else {
                    // Delete override
                    const overrides = bType === 'ndt' ? state.ndtPCOverrides : state.etPCOverrides;
                    delete overrides[key];
                }
                closePCEditor();
                render();
            });

            document.getElementById('pcEditorCancel').addEventListener('click', closePCEditor);

            pcInput.addEventListener('keydown', e => {
                if (e.key === 'Enter') document.getElementById('pcEditorOk').click();
                if (e.key === 'Escape') closePCEditor();
            });

            // Close editor when clicking outside
            document.addEventListener('mousedown', e => {
                if (pcEditor.classList.contains('vis') && !pcEditor.contains(e.target) &&
                    !e.target.closest('.gbar-ndt') && !e.target.closest('.gbar-et')) {
                    closePCEditor();
                }
            });

            // === Middle-click to split bar ===
            innerEl.querySelectorAll('.gbar-ndt, .gbar-et').forEach(bar => {
                bar.addEventListener('mousedown', e => {
                    if (e.button !== 1) return; // Middle-click
                    e.preventDefault();
                    e.stopPropagation();

                    const key = bar.dataset.key;
                    const bType = bar.dataset.type;
                    const segIdx = bar.dataset.seg !== undefined ? parseInt(bar.dataset.seg) : null;
                    const rect = barsEl.getBoundingClientRect();
                    const barRect = bar.getBoundingClientRect();
                    const clickX = e.clientX - rect.left + barsEl.scrollLeft;

                    // Calculate split date from click position
                    const splitDate = pxToDate(clickX);
                    splitDate.setHours(0,0,0,0);
                    const splitDateStr = splitDate.toISOString().slice(0,10);

                    // Get current bar's start and end
                    const barStartStr = bar.dataset.s;
                    const barEndStr = bar.dataset.e;
                    const barStart = new Date(barStartStr);
                    const barEnd = new Date(barEndStr);

                    // Ensure split point is inside the bar with at least 1 day margin
                    const oneDay = 864e5;
                    if (splitDate <= new Date(barStart.getTime() + oneDay) || splitDate >= new Date(barEnd.getTime() - oneDay)) return;

                    // Determine which split array to update
                    const splits = bType === 'ndt' ? state.ndtSplits : state.etSplits;

                    // If bar already has splits, split the affected segment
                    if (key in splits) {
                        const segments = splits[key];
                        let splitSegIdx = -1;

                        // Find which segment contains the split point
                        for (let i = 0; i < segments.length; i++) {
                            const seg = segments[i];
                            const segStart = new Date(seg.start);
                            const segEnd = new Date(seg.end);
                            if (splitDate >= segStart && splitDate < segEnd) {
                                splitSegIdx = i;
                                break;
                            }
                        }

                        if (splitSegIdx >= 0) {
                            const seg = segments[splitSegIdx];
                            const pc = seg.pc;
                            // Replace segment with two new ones
                            const newSeg1 = { start: seg.start, end: splitDateStr, pc };
                            const newSeg2 = { start: splitDateStr, end: seg.end, pc };
                            segments.splice(splitSegIdx, 1, newSeg1, newSeg2);
                        }
                    } else {
                        // Create initial splits from the single bar
                        const pc = parseInt(bar.dataset.pc) || null;
                        const newSeg1 = { start: barStartStr, end: splitDateStr, pc };
                        const newSeg2 = { start: splitDateStr, end: barEndStr, pc };
                        splits[key] = [newSeg1, newSeg2];
                    }

                    render();
                });
            });

            // Sync vertical scroll
            barsEl.onscroll = () => { labelsEl.scrollTop = barsEl.scrollTop; };
        }

        initUI();

        // Date range controls — 開始日期 + 顯示天數滑桿
        const dateFromEl = document.getElementById('dateFrom');
        const daySlider = document.getElementById('daySlider');
        const daySliderVal = document.getElementById('daySliderVal');
        const dateToLabel = document.getElementById('dateToLabel');

        function clampSliderToGranularity() {
            const maxDays = MAX_RANGE_DAYS[state.gran] || 365;
            daySlider.max = maxDays;
            if (parseInt(daySlider.value) > maxDays) daySlider.value = maxDays;
        }

        function updateDateRange() {
            const f = dateFromEl.value;
            const days = parseInt(daySlider.value);
            daySliderVal.textContent = days + ' 天';
            if (f) {
                const fromD = new Date(f);
                const toD = new Date(fromD.getTime() + days * 864e5);
                dateToLabel.textContent = '→ ' + toD.toISOString().slice(0, 10);
                state.dateFrom = fromD;
                state.dateTo = toD;
                render();
            } else {
                dateToLabel.textContent = '→ ';
                if (state.dateFrom) {
                    state.dateFrom = null;
                    state.dateTo = null;
                    render();
                }
            }
        }

        dateFromEl.addEventListener('change', updateDateRange);
        daySlider.addEventListener('input', () => {
            daySliderVal.textContent = daySlider.value + ' 天';
            // 即時更新結束日期標籤（不觸發 render）
            const f = dateFromEl.value;
            if (f) {
                const toD = new Date(new Date(f).getTime() + parseInt(daySlider.value) * 864e5);
                dateToLabel.textContent = '→ ' + toD.toISOString().slice(0, 10);
            }
        });
        daySlider.addEventListener('change', updateDateRange);

        document.getElementById('dateReset').addEventListener('click', () => {
            dateFromEl.value = '';
            daySlider.value = 365;
            clampSliderToGranularity();
            daySliderVal.textContent = daySlider.value + ' 天';
            dateToLabel.textContent = '→ ';
            state.dateFrom = null;
            state.dateTo = null;
            render();
        });

        // 初始化滑桿上限
        clampSliderToGranularity();

        // NDT / ET toggles
        document.getElementById('showNDT').addEventListener('change', e => {
            state.showNDT = e.target.checked;
            document.getElementById('legNDT').style.display = e.target.checked ? '' : 'none';
            render();
        });
        document.getElementById('showET').addEventListener('change', e => {
            state.showET = e.target.checked;
            document.getElementById('legET').style.display = e.target.checked ? '' : 'none';
            render();
        });

        // Reset overrides button
        const resetBtn = document.getElementById('resetOverrides');
        resetBtn.addEventListener('click', () => {
            state.ndtOverrides = {};
            state.etOverrides = {};
            state.ndtPCOverrides = {};
            state.etPCOverrides = {};
            state.ndtSplits = {};
            state.etSplits = {};
            resetBtn.style.display = 'none';
            render();
        });

        // NDT/ET offset inputs
        ['ndtOffStart','ndtOffEnd','etOffStart','etOffEnd'].forEach(id => {
            document.getElementById(id).addEventListener('change', e => {
                state[id] = Math.max(0, parseInt(e.target.value) || 0);
                render();
            });
        });

        // Personnel count inputs
        ['pGT','pST','pOther','pET'].forEach(id => {
            document.getElementById(id).addEventListener('input', e => {
                state[id] = parseInt(e.target.value) || 0;
                render();
            });
        });

        // Baseline inputs
        ['baseNDT','baseET','baseTotal'].forEach(id => {
            document.getElementById(id).addEventListener('input', e => {
                state[id] = parseInt(e.target.value) || 0;
                render();
            });
        });

        // === A3 PDF Export ===
        // Load dependencies dynamically
        function loadScript(src) {
            return new Promise((resolve, reject) => {
                if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
                const s = document.createElement('script');
                s.src = src; s.onload = resolve; s.onerror = reject;
                document.head.appendChild(s);
            });
        }

        document.getElementById('exportPdf').addEventListener('click', async () => {
            const btn = document.getElementById('exportPdf');
            btn.disabled = true; btn.textContent = '準備中...';

            try {
                await loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js');
                await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');

                btn.textContent = '擷取畫面...';

                // Build a temporary off-screen clone for full-width capture
                const chartW = document.querySelector('.chart-wrapper');
                const sidebar = document.getElementById('sidebar');
                const header = document.querySelector('.header');

                // A3 landscape: 420mm x 297mm, at 96dpi ≈ 1587 x 1123px
                // We'll render at 2x for quality: 3174 x 2246
                const A3_W_MM = 420, A3_H_MM = 297;
                const MARGIN_MM = 10;
                const printW = A3_W_MM - MARGIN_MM * 2;  // usable mm
                const printH = A3_H_MM - MARGIN_MM * 2;

                // 使用畫面實際寬度
                const screenW = document.querySelector('.app').offsetWidth;

                // Create off-screen container
                const offscreen = document.createElement('div');
                offscreen.style.cssText = `position:fixed;left:-9999px;top:0;width:${screenW}px;background:#fff;z-index:-1;`;
                document.body.appendChild(offscreen);

                // Clone header
                const hClone = header.cloneNode(true);
                hClone.style.boxShadow = 'none';
                offscreen.appendChild(hClone);

                // Clone warning banner if visible
                const warnEl = document.getElementById('rangeWarning');
                if (warnEl && warnEl.style.display !== 'none') {
                    offscreen.appendChild(warnEl.cloneNode(true));
                }

                // Clone legend
                const legendEl = document.querySelector('.legend');
                if (legendEl) offscreen.appendChild(legendEl.cloneNode(true));

                // Build chart snapshot: sidebar + chart as a wide layout
                const snapDiv = document.createElement('div');
                snapDiv.style.cssText = 'display:flex;background:#fff;';

                // Sidebar clone
                const sbClone = sidebar.cloneNode(true);
                sbClone.style.cssText = 'width:110px;min-width:110px;border-right:1px solid #ddd;background:#fafafa;padding:6px;flex-shrink:0;overflow:visible;';
                snapDiv.appendChild(sbClone);

                // Chart area clone
                const chartClone = document.createElement('div');
                chartClone.style.cssText = 'flex:1;display:flex;flex-direction:column;overflow:visible;';

                // Clone ALL time rows (top row + sub row)
                const timeRows = document.querySelectorAll('.time-row');
                timeRows.forEach(tr => {
                    if (tr.style.display === 'none') return;
                    const trClone = tr.cloneNode(true);
                    trClone.style.cssText = `display:flex;height:${tr.offsetHeight}px;border-bottom:1px solid #ddd;background:#fafafa;overflow:visible;`;
                    chartClone.appendChild(trClone);
                });

                // Gantt body clone
                const ganttBody = document.createElement('div');
                ganttBody.style.cssText = 'display:flex;overflow:visible;';

                const labelsClone = document.getElementById('ganttLabels').cloneNode(true);
                labelsClone.style.cssText = 'width:160px;min-width:160px;border-right:1px solid #ddd;overflow:visible;';
                ganttBody.appendChild(labelsClone);

                const barsClone = document.getElementById('ganttBars').cloneNode(true);
                barsClone.style.cssText = 'flex:1;overflow:visible;';
                const innerClone = barsClone.querySelector('.gantt-bars-inner') || barsClone.firstElementChild;
                if (innerClone) innerClone.style.overflow = 'visible';
                ganttBody.appendChild(barsClone);

                chartClone.appendChild(ganttBody);
                snapDiv.appendChild(chartClone);
                offscreen.appendChild(snapDiv);

                // Let browser layout the offscreen elements
                await new Promise(r => setTimeout(r, 200));

                btn.textContent = '產生PDF中...';

                const canvas = await html2canvas(offscreen, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: '#ffffff',
                    logging: false,
                    windowWidth: screenW
                });

                document.body.removeChild(offscreen);

                // Create PDF
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a3' });

                // Calculate scaling to fit A3 landscape with margins
                const imgW = canvas.width, imgH = canvas.height;
                const ratio = Math.min(printW / imgW, printH / imgH);
                const drawW = imgW * ratio, drawH = imgH * ratio;
                // Center on page
                const offX = MARGIN_MM + (printW - drawW) / 2;
                const offY = MARGIN_MM;

                const imgData = canvas.toDataURL('image/png');
                pdf.addImage(imgData, 'PNG', offX, offY, drawW, drawH);

                // Add footer
                pdf.setFontSize(8);
                pdf.setTextColor(150);
                const now = new Date();
                pdf.text(`台灣電力公司 大修排程甘特圖 — 匯出時間: ${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`, MARGIN_MM, A3_H_MM - 5);

                pdf.save('大修排程甘特圖_A3.pdf');
                btn.textContent = '匯出 A3 PDF';
                btn.disabled = false;

            } catch (err) {
                console.error('PDF export error:', err);
                alert('PDF匯出失敗: ' + err.message);
                btn.textContent = '匯出 A3 PDF';
                btn.disabled = false;
            }
        });

        render();
        // Re-render on window resize to recalculate widths
        window.addEventListener('resize', () => render());
    </script>
</body>
</html>
